name: Deploy to Firebase Hosting on Merge
'on':
  push:
    branches:
      - main # OU a sua branch principal se não for main (ex: master)
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Instalar Dependências e Gerar Build
        run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_CAMPANHAVIVA_PROJETO }}' # Verifique se este nome está IGUAL ao segredo no GitHub
          projectId: campanhaviva-projeto
          channelId: live
