version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - campanhaviva_network

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A workers.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - campanhaviva_network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: campanhaviva
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - campanhaviva_network

  # Redis Cache & Broker
  redis:
    image: redis:7-alpine
    networks:
      - campanhaviva_network

networks:
  campanhaviva_network:
    driver: bridge

volumes:
  postgres_data:
